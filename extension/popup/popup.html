<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Pokaji</h1>
      <p class="subtitle">Покажи, а не рассказывай</p>
    </div>

    <!-- Auth screen -->
    <div id="auth-screen" class="screen hidden">
      <p>Войдите, чтобы начать запись</p>
      <button id="btn-login" class="btn btn-primary">Войти</button>
    </div>

    <!-- Main screen -->
    <div id="main-screen" class="screen hidden">
      <button id="btn-start" class="btn btn-primary btn-big">Начать запись</button>
      <div class="hotkey-hint">
        Горячая клавиша: <kbd>Alt + Shift + P</kbd>
      </div>
      <button id="btn-dashboard" class="btn btn-secondary">Мои видео</button>
    </div>

    <!-- Recording screen -->
    <div id="recording-screen" class="screen hidden">
      <div class="live-dot-row">
        <div class="dot"></div>
        <span>Запись идёт</span>
      </div>
      <div class="timer-big" id="popup-timer">00:00</div>
      <button id="btn-open-recorder" class="btn btn-secondary">Окно записи</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
